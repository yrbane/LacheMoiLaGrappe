  <text x="520" y="280" font-family="sans-serif" font-weight="bold" font-size="72" fill="white">LaGrappe</text>
  <text x="520" y="340" font-family="sans-serif" font-weight="300" font-size="24" fill="white" fill-opacity="0.8">Votre telephone, vos regles.</text>
